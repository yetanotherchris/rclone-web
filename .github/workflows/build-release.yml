name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-X main.version=${{ steps.version.outputs.VERSION }} -s -w" -o rclone-web ./
      - name: Package binary (unix)
        if: matrix.goos != 'windows'
        run: |
          mv rclone-web rclone-web-${{ matrix.suffix }}
          tar czf rclone-web-${{ matrix.suffix }}.tar.gz rclone-web-${{ matrix.suffix }}
      - name: Rename binary (windows)
        if: matrix.goos == 'windows'
        run: mv rclone-web rclone-web-${{ matrix.suffix }}.exe
      - name: Upload artifact (unix)
        if: matrix.goos != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-web-${{ matrix.suffix }}
          path: rclone-web-${{ matrix.suffix }}.tar.gz
      - name: Upload artifact (windows)
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-web-${{ matrix.suffix }}
          path: rclone-web-${{ matrix.suffix }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
      - name: Switch to main branch
        run: |
          git checkout main
          git pull --rebase origin main
      - name: Update Scoop manifest
        shell: pwsh
        run: ./updatescoop.ps1 -Version ${{ steps.version.outputs.VERSION }}
      - name: Update Brew formula
        shell: pwsh
        run: ./updatebrew.ps1 -Version ${{ steps.version.outputs.VERSION }}
      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update package manifests to ${{ github.ref_name }}"
          file_pattern: "rclone-web.json Formula/rclone-web.rb"
